<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#efe9e0" />
    <!-- iOS "홈 화면 추가" 대응(플러그인이 안 넣는 부분) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SentenceMate" />
    <title>SentenceMate Reader</title>
    <!-- 다크모드 FOUC 방지(조각 C): mount 전 저장된 테마를 즉시 적용.
         키/모양은 zustand persist(useSettings, key 'sm-settings', JSON .state.theme)와 일치시킬 것. -->
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('sm-settings')).state.theme
        if (t) document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
